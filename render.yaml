services:
  - type: web
    name: juego-del-dia-2
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: juego2-db
          property: connectionString

databases:
  - name: juego2-db
    plan: free
