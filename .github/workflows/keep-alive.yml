name: keep-alive
# Mantiene despierta la app en Render (plan gratis se duerme tras ~15 min sin uso).
# Hace ping a la URL cada 5 minutos. No toca la app.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl -fsS -m 90 https://juego-del-dia-2.onrender.com/ -o /dev/null \
            && echo "ok: app respondió" \
            || echo "aviso: ping falló (se reintenta en 5 min)"
